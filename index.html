  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .flip-card {
      background-color: transparent;
      width: 100%;
      aspect-ratio: 1 / 1;
      perspective: 1000px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transform-style: preserve-3d;
      animation: auto-flip 12s infinite ease-in-out;
    }

    @keyframes auto-flip {
      0% {
        transform: rotateY(0deg);
      }

      45% {
        transform: rotateY(0deg);
      }

      50% {
        transform: rotateY(180deg);
      }

      95% {
        transform: rotateY(180deg);
      }

      100% {
        transform: rotateY(360deg);
      }
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 0.5rem;
      /* rounded-lg */
      overflow: hidden;
    }

    .flip-card-front {
      background-color: #fdf6e3;
    }

    .flip-card-back {
      background-color: #bc961f;
      color: white;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0.5rem;
    }

    /* Staggered Animation Delays */
    .grid>.flip-card:nth-child(1) .flip-card-inner {
      animation-delay: 0.2s;
    }

    .grid>.flip-card:nth-child(2) .flip-card-inner {
      animation-delay: 0.4s;
    }

    .grid>.flip-card:nth-child(3) .flip-card-inner {
      animation-delay: 0.6s;
    }

    .grid>.flip-card:nth-child(4) .flip-card-inner {
      animation-delay: 0.8s;
    }

    .grid>.flip-card:nth-child(5) .flip-card-inner {
      animation-delay: 1.0s;
    }

    .grid>.flip-card:nth-child(6) .flip-card-inner {
      animation-delay: 1.2s;
    }

    .grid>.flip-card:nth-child(7) .flip-card-inner {
      animation-delay: 1.4s;
    }

    .grid>.flip-card:nth-child(8) .flip-card-inner {
      animation-delay: 1.6s;
    }

    .grid>.flip-card:nth-child(9) .flip-card-inner {
      animation-delay: 1.8s;
    }

    .grid>.flip-card:nth-child(10) .flip-card-inner {
      animation-delay: 2.0s;
    }

    .grid>.flip-card:nth-child(11) .flip-card-inner {
      animation-delay: 2.2s;
    }

    .grid>.flip-card:nth-child(12) .flip-card-inner {
      animation-delay: 2.4s;
    }

    .grid>.flip-card:nth-child(13) .flip-card-inner {
      animation-delay: 2.6s;
    }

    .grid>.flip-card:nth-child(14) .flip-card-inner {
      animation-delay: 2.8s;
    }

    .grid>.flip-card:nth-child(15) .flip-card-inner {
      animation-delay: 3.0s;
    }

    .grid>.flip-card:nth-child(16) .flip-card-inner {
      animation-delay: 3.2s;
    }

    .grid>.flip-card:nth-child(17) .flip-card-inner {
      animation-delay: 3.4s;
    }

    .grid>.flip-card:nth-child(18) .flip-card-inner {
      animation-delay: 3.6s;
    }

    .grid>.flip-card:nth-child(19) .flip-card-inner {
      animation-delay: 3.8s;
    }

    .grid>.flip-card:nth-child(20) .flip-card-inner {
      animation-delay: 4.0s;
    }
  </style>
